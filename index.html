<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#私を構成するポケモン6匹</title>
    <style>
        /* CSSは前回と同様のため省略可ですが、一応完成形で載せます */
        :root { --ultra-black: #333; --ultra-yellow: #ffcb05; --ultra-white: #fff; }
        body { font-family: sans-serif; background: #222; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-container { background: linear-gradient(180deg, var(--ultra-black) 45%, var(--ultra-yellow) 45%, var(--ultra-yellow) 55%, var(--ultra-white) 55%); border: 4px solid #000; border-radius: 20px; padding: 20px; width: 340px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .slot { width: 150px; height: 150px; background: rgba(255,255,255,0.9); border: 3px solid #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .slot.selected { border-color: var(--ultra-yellow); box-shadow: 0 0 15px var(--ultra-yellow); }
        .slot img { width: 90%; height: 90%; object-fit: contain; }
        .controls { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; width: 100%; box-sizing: border-box; }
        input { padding: 10px; width: 80%; border-radius: 20px; border: 2px solid #000; margin-bottom: 10px; }
        button { background: var(--ultra-yellow); color: #000; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        #status { font-size: 0.8rem; color: var(--ultra-yellow); margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 style="text-shadow: 2px 2px 0 #000; font-size: 1.2rem;">#私を構成するポケモン6匹</h1>
        <div class="grid" id="pokemon-grid">
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
        </div>
        <div class="controls">
            <div id="status"></div>
            <input type="text" id="pokemon-input" placeholder="例：ピカチュウ、ルカリオ">
            <button onclick="generateImage()">画像として保存</button>
        </div>
    </div>
    <canvas id="export-canvas" style="display:none;"></canvas>

    <script>
        // 日本語名とIDの対応表（外部から読み込むのが理想ですが、主要なものをサンプルで用意）
        // ※実際は数千行になるため、ここでは主要な例を載せ、
        // 実行時に「日本語名リスト」を取得するロジックに変更します。
        
        let selectedSlot = null;
        const input = document.getElementById('pokemon-input');
        const status = document.getElementById('status');

        function selectSlot(el) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            selectedSlot = el;
            el.classList.add('selected');
            input.focus();
        }

        // ページ読み込み時に日本語名データを取得（PokeAPIの全言語リストは重いため、軽量な外部データを利用）
        let pokemonDict = {};
        async function loadNames() {
            status.innerText = "データを準備中...";
            try {
                // ポケモンの日本語名を含む軽量なJSON（GitHub等の有志データ）を利用するのが一般的
                const res = await fetch('https://raw.githubusercontent.com/kotofurumiya/pokemon_data/master/pokemon_data.json');
                const data = await res.json();
                // 検索しやすいように辞書化
                data.forEach(p => {
                    pokemonDict[p.name] = p.id;
                });
                status.innerText = "準備完了！";
                setTimeout(() => status.innerText = "", 2000);
            } catch (e) {
                status.innerText = "通信エラー。英語名なら動くかも。";
            }
        }
        loadNames();

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && selectedSlot) {
                const name = input.value.trim();
                if (!name) return;

                const id = pokemonDict[name];
                if (!id) {
                    status.innerText = "名前が見つかりません。正確なカタカナで入力してね。";
                    return;
                }

                status.innerText = "読み込み中...";
                try {
                    const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                    const data = await pokeRes.json();
                    const imgUrl = data.sprites.other['official-artwork'].front_default;
                    
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.src = imgUrl;
                    img.onload = () => {
                        selectedSlot.innerHTML = `<img src="${imgUrl}">`;
                        input.value = "";
                        status.innerText = "";
                        selectedSlot.classList.remove('selected');
                        selectedSlot = null;
                    };
                } catch (err) {
                    status.innerText = "画像の取得に失敗しました。";
                }
            }
        });

        // (generateImage関数は前回と同じなので、ここでも流用してください)
        async function generateImage() {
            const canvas = document.getElementById('export-canvas');
            const ctx = canvas.getContext('2d');
            const slots = document.querySelectorAll('.slot');
            canvas.width = 1000; canvas.height = 1200;
            ctx.fillStyle = "#333"; ctx.fillRect(0, 0, 1000, 540); // 黒
            ctx.fillStyle = "#ffcb05"; ctx.fillRect(0, 540, 1000, 120); // 黄
            ctx.fillStyle = "#fff"; ctx.fillRect(0, 660, 1000, 540); // 白
            ctx.fillStyle = "#fff"; ctx.font = "bold 60px sans-serif"; ctx.textAlign = "center";
            ctx.shadowColor = "black"; ctx.shadowBlur = 10;
            ctx.fillText("#私を構成するポケモン6匹", 500, 100);
            ctx.shadowBlur = 0;
            const padding = 40; const slotSize = 420;
            for (let i = 0; i < 6; i++) {
                const x = 50 + (i % 2) * (slotSize + padding);
                const y = 180 + Math.floor(i / 2) * (slotSize + padding);
                ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 10;
                ctx.fillRect(x, y, slotSize, slotSize); ctx.strokeRect(x, y, slotSize, slotSize);
                const img = slots[i].querySelector('img');
                if (img) ctx.drawImage(img, x+10, y+10, slotSize-20, slotSize-20);
            }
            const link = document.createElement('a');
            link.download = 'my-pokemon-team.png';
            link.href = canvas.toDataURL(); link.click();
        }
    </script>
</body>
</html>
