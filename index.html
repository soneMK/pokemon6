<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推しポケモン6選</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --hyper-black: #0a0a0f;
    --hyper-deep: #10101a;
    --hyper-gold: #f5c842;
    --hyper-gold2: #e8a000;
    --hyper-blue: #1a1aff;
    --hyper-blue-light: #4466ff;
    --hyper-white: #f0f0ff;
    --hyper-gray: #2a2a3a;
    --hyper-red: #cc2233;
    --stripe-gold: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 5px,
      rgba(245,200,66,0.05) 5px,
      rgba(245,200,66,0.05) 10px
    );
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--hyper-black);
    color: var(--hyper-white);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(204,17,17,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(245,200,66,0.06) 0%, transparent 50%),
      var(--stripe-gold);
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
  }

  .header-ball {
    width: 80px; height: 80px;
    margin: 0 auto 20px;
    position: relative;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }

  .ball-svg { width: 100%; height: 100%; filter: drop-shadow(0 0 16px rgba(204,17,17,0.7)) drop-shadow(0 0 6px rgba(0,0,0,0.8)); }

  h1 {
    font-family: 'Zen Dots', cursive;
    font-size: clamp(1.6rem, 5vw, 2.8rem);
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--hyper-gold) 0%, #fff 50%, var(--hyper-gold2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    line-height: 1.2;
  }

  .subtitle {
    margin-top: 8px;
    font-size: 0.85rem;
    color: rgba(240,240,255,0.5);
    letter-spacing: 0.1em;
  }

  /* ── SEARCH ── */
  .search-section {
    max-width: 520px;
    margin: 0 auto 40px;
    padding: 0 20px;
  }

  .search-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--hyper-deep);
    border: 1.5px solid var(--hyper-gold);
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(245,200,66,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: box-shadow 0.2s;
  }

  .search-wrapper:focus-within {
    box-shadow: 0 0 30px rgba(245,200,66,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .search-icon {
    padding: 0 14px 0 18px;
    font-size: 1.1rem;
    opacity: 0.6;
    flex-shrink: 0;
  }

  #searchInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 4px;
    color: var(--hyper-white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    caret-color: var(--hyper-gold);
  }

  #searchInput::placeholder { color: rgba(240,240,255,0.3); }

  .clear-btn {
    padding: 0 18px;
    background: none;
    border: none;
    color: rgba(240,240,255,0.4);
    cursor: pointer;
    font-size: 1.1rem;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .clear-btn:hover { color: var(--hyper-gold); }

  .search-results {
    position: absolute;
    top: calc(100% + 8px);
    left: 0; right: 0;
    background: #14141e;
    border: 1px solid rgba(245,200,66,0.3);
    border-radius: 16px;
    overflow: hidden;
    z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    display: none;
  }

  .search-result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:hover { background: rgba(245,200,66,0.08); }

  .result-sprite {
    width: 40px; height: 40px;
    image-rendering: pixelated;
  }

  .result-name { font-size: 0.95rem; font-weight: 700; }
  .result-id { font-size: 0.75rem; color: rgba(240,240,255,0.4); margin-left: auto; }

  /* ── SLOTS GRID ── */
  .slots-section {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 40px;
  }

  .slots-label {
    text-align: center;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    color: rgba(240,240,255,0.35);
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .slots-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  @media (max-width: 600px) {
    .slots-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
  }

  /* ── POKEMON CARD ── */
  .pokemon-slot {
    aspect-ratio: 3/4;
    border-radius: 20px;
    border: 1.5px solid rgba(245,200,66,0.2);
    background: var(--hyper-deep);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .pokemon-slot:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--hyper-gold);
    box-shadow: 0 8px 32px rgba(245,200,66,0.2);
  }

  .pokemon-slot.filled {
    border-color: rgba(245,200,66,0.5);
    background: linear-gradient(160deg, #12121c 0%, #0d0d1a 100%);
  }

  .pokemon-slot.filled:hover {
    box-shadow: 0 8px 40px rgba(245,200,66,0.3);
  }

  /* Ball decoration inside card */
  .slot-ball-deco {
    position: absolute;
    bottom: -30px; right: -30px;
    width: 100px; height: 100px;
    opacity: 0.05;
  }

  /* Slot number badge */
  .slot-number {
    position: absolute;
    top: 10px; left: 12px;
    font-family: 'Zen Dots', cursive;
    font-size: 0.7rem;
    color: var(--hyper-gold);
    opacity: 0.7;
  }

  /* Remove button */
  .remove-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(204,34,51,0.15);
    border: 1px solid rgba(204,34,51,0.4);
    color: var(--hyper-red);
    font-size: 0.75rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, background 0.2s;
    z-index: 5;
  }

  .pokemon-slot.filled:hover .remove-btn { opacity: 1; }
  .remove-btn:hover { background: rgba(204,34,51,0.4); }

  /* Empty state */
  .slot-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    opacity: 0.35;
    pointer-events: none;
  }

  .slot-empty-ball {
    width: 48px; height: 48px;
  }

  .slot-empty-text {
    font-size: 0.78rem;
    color: rgba(240,240,255,0.6);
    text-align: center;
    line-height: 1.4;
  }

  /* Filled card content */
  .slot-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 8px 12px;
    width: 100%;
    height: 100%;
    justify-content: center;
  }

  .slot-rank {
    font-family: 'Zen Dots', cursive;
    font-size: 0.65rem;
    color: var(--hyper-gold);
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }

  .slot-sprite {
    width: 80px; height: 80px;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 12px rgba(245,200,66,0.3));
    animation: bob 2.5s ease-in-out infinite;
  }

  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .slot-name-jp {
    font-size: 0.95rem;
    font-weight: 900;
    margin-top: 8px;
    color: var(--hyper-white);
    letter-spacing: 0.05em;
  }

  .slot-name-en {
    font-size: 0.65rem;
    color: rgba(240,240,255,0.4);
    margin-top: 2px;
    font-family: 'Zen Dots', cursive;
    letter-spacing: 0.08em;
  }

  .slot-types {
    display: flex;
    gap: 4px;
    margin-top: 8px;
  }

  .type-badge {
    font-size: 0.6rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .comment-area {
    width: calc(100% - 16px);
    margin-top: 8px;
    font-size: 0.7rem;
    color: rgba(240,240,255,0.5);
    text-align: center;
    background: transparent;
    border: none;
    border-top: 1px solid rgba(245,200,66,0.1);
    padding-top: 8px;
    resize: none;
    outline: none;
    font-family: 'Noto Sans JP', sans-serif;
    line-height: 1.5;
    max-height: 48px;
    overflow: hidden;
    cursor: text;
  }

  .comment-area::placeholder { color: rgba(240,240,255,0.2); }

  /* ── ACTION BUTTONS ── */
  .actions {
    max-width: 900px;
    margin: 0 auto 60px;
    padding: 0 20px;
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    border-radius: 50px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.05em;
  }

  .btn-generate {
    background: linear-gradient(135deg, var(--hyper-gold) 0%, var(--hyper-gold2) 100%);
    color: var(--hyper-black);
    box-shadow: 0 4px 20px rgba(245,200,66,0.4);
  }

  .btn-generate:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(245,200,66,0.6);
  }

  .btn-generate:active { transform: translateY(0); }

  .btn-share {
    background: var(--hyper-black);
    color: var(--hyper-white);
    border: 1.5px solid rgba(240,240,255,0.2);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .btn-share:hover {
    border-color: var(--hyper-white);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .btn-icon { font-size: 1.1rem; }

  /* ── CANVAS PREVIEW MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.active {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: #12121e;
    border: 1.5px solid rgba(245,200,66,0.3);
    border-radius: 24px;
    padding: 28px;
    max-width: 540px;
    width: 100%;
    box-shadow: 0 24px 80px rgba(0,0,0,0.8);
    transform: translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.active .modal-box { transform: translateY(0); }

  .modal-title {
    font-family: 'Zen Dots', cursive;
    font-size: 1rem;
    color: var(--hyper-gold);
    margin-bottom: 16px;
    text-align: center;
  }

  #previewCanvas {
    width: 100%;
    border-radius: 12px;
    display: block;
    border: 1px solid rgba(245,200,66,0.2);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    justify-content: center;
  }

  .btn-download {
    background: linear-gradient(135deg, var(--hyper-gold) 0%, var(--hyper-gold2) 100%);
    color: var(--hyper-black);
    padding: 11px 24px;
    border-radius: 50px;
    border: none;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .btn-download:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(245,200,66,0.4); }

  .btn-close-modal {
    background: transparent;
    color: rgba(240,240,255,0.5);
    padding: 11px 24px;
    border-radius: 50px;
    border: 1px solid rgba(240,240,255,0.15);
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .btn-close-modal:hover { border-color: rgba(240,240,255,0.4); color: var(--hyper-white); }

  /* Type colors */
  .type-normal { background: #a8a878; color: #fff; }
  .type-fire { background: #f08030; color: #fff; }
  .type-water { background: #6890f0; color: #fff; }
  .type-electric { background: #f8d030; color: #333; }
  .type-grass { background: #78c850; color: #fff; }
  .type-ice { background: #98d8d8; color: #333; }
  .type-fighting { background: #c03028; color: #fff; }
  .type-poison { background: #a040a0; color: #fff; }
  .type-ground { background: #e0c068; color: #333; }
  .type-flying { background: #a890f0; color: #fff; }
  .type-psychic { background: #f85888; color: #fff; }
  .type-bug { background: #a8b820; color: #fff; }
  .type-rock { background: #b8a038; color: #fff; }
  .type-ghost { background: #705898; color: #fff; }
  .type-dragon { background: #7038f8; color: #fff; }
  .type-dark { background: #705848; color: #fff; }
  .type-steel { background: #b8b8d0; color: #333; }
  .type-fairy { background: #f0b6bc; color: #333; }

  /* Loading spinner */
  .loading-spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: var(--hyper-black);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e1e2e;
    border: 1px solid rgba(245,200,66,0.4);
    color: var(--hyper-white);
    padding: 12px 24px;
    border-radius: 50px;
    font-size: 0.85rem;
    transition: transform 0.3s;
    z-index: 999;
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-ball">
    <svg class="ball-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="topRed" cx="38%" cy="32%">
          <stop offset="0%" stop-color="#ff6655"/>
          <stop offset="100%" stop-color="#cc1111"/>
        </radialGradient>
        <radialGradient id="btmWhite" cx="38%" cy="60%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#cccccc"/>
        </radialGradient>
        <radialGradient id="btnGrad" cx="35%" cy="35%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#dddddd"/>
        </radialGradient>
      </defs>
      <!-- Top half: red -->
      <path d="M5,50 A45,45 0 0,1 95,50 Z" fill="url(#topRed)"/>
      <!-- Bottom half: white -->
      <path d="M5,50 A45,45 0 0,0 95,50 Z" fill="url(#btmWhite)"/>
      <!-- Black divider band -->
      <rect x="5" y="45" width="90" height="10" fill="#222"/>
      <!-- Outline -->
      <circle cx="50" cy="50" r="45" fill="none" stroke="#222" stroke-width="2.5"/>
      <!-- Center button ring (black) -->
      <circle cx="50" cy="50" r="12" fill="#222"/>
      <!-- Center button (white) -->
      <circle cx="50" cy="50" r="8" fill="url(#btnGrad)"/>
      <!-- Shine -->
      <ellipse cx="35" cy="30" rx="9" ry="5" fill="rgba(255,255,255,0.3)" transform="rotate(-20,35,30)"/>
    </svg>
  </div>
  <h1>推しポケモン 6選</h1>
  <p class="subtitle">MY FAVORITE POKÉMON</p>
</header>

<!-- Search -->
<div class="search-section">
  <div style="position:relative">
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="ポケモン名で検索（例：ピカチュウ、ゲンガー）" autocomplete="off" />
      <button class="clear-btn" id="clearBtn" style="display:none">✕</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- Slots -->
<div class="slots-section">
  <p class="slots-label">── 6枠のスロット ──</p>
  <div class="slots-grid" id="slotsGrid"></div>
</div>

<!-- Actions -->
<div class="actions">
  <button class="btn btn-generate" id="generateBtn">
    <span class="btn-icon">🎨</span> 画像を生成
  </button>
  <button class="btn btn-share" id="shareBtn">
    <span class="btn-icon">𝕏</span> Xでシェア
  </button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <p class="modal-title">✦ 推しポケモン6選 ✦</p>
    <canvas id="previewCanvas"></canvas>
    <div class="modal-actions">
      <button class="btn-download" id="downloadBtn">📥 ダウンロード</button>
      <button class="btn-close-modal" id="closeModal">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Pokemon Data (Japanese names) ───────────────────────────────────────────
// Type data cache
const typeCache = {};
const spriteBase = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/";

// ─── Full Pokémon list fetched from PokeAPI ───────────────────────────────────
let pokemonList = []; // { id, nameJp, nameEn }
let listReady = false;

async function loadPokemonList() {
  try {
    const res = await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=1025');
    const data = await res.json();
    pokemonList = data.results.map(p => {
      const id = parseInt(p.url.split('/').filter(Boolean).pop());
      return { id, nameEn: p.name, nameJp: null };
    });
    listReady = true;
    document.getElementById('searchInput').placeholder = 'ポケモン名で検索（例：ピカチュウ、ゲンガー）';

    // バックグラウンドで全件の日本語名を先読みキャッシュ（10件ずつ）
    prefetchJpNames();
  } catch(e) {
    document.getElementById('searchInput').placeholder = '検索（例：25 / pikachu）';
  }
}

async function prefetchJpNames() {
  const BATCH = 10;
  for (let i = 0; i < pokemonList.length; i += BATCH) {
    const batch = pokemonList.slice(i, i + BATCH);
    await Promise.all(batch.map(async p => {
      if (!p.nameJp) {
        p.nameJp = await getJpName(p.id, p.nameEn);
      }
    }));
    // 少し間隔を空けてAPI負荷を下げる
    await new Promise(r => setTimeout(r, 50));
  }
}

// Fetch Japanese name on demand and cache it
const jpNameCache = {};
async function getJpName(id, nameEn) {
  if (jpNameCache[id]) return jpNameCache[id];
  try {
    const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`);
    const data = await res.json();
    const ja = data.names.find(n => n.language.name === 'ja-Hrkt') || data.names.find(n => n.language.name === 'ja');
    const name = ja ? ja.name : nameEn;
    jpNameCache[id] = name;
    return name;
  } catch(e) {
    return nameEn;
  }
}

// ─── State ────────────────────────────────────────────────────────────────────
let slots = Array(6).fill(null);
let selectedSlot = -1;

// ─── Build slots grid ─────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('slotsGrid');
  grid.innerHTML = '';
  slots.forEach((poke, i) => {
    const div = document.createElement('div');
    div.className = 'pokemon-slot' + (poke ? ' filled' : '');
    div.dataset.slot = i;

    const ballDeco = createBallSVG(0.06);
    ballDeco.className = 'slot-ball-deco';
    div.appendChild(ballDeco);

    const numBadge = document.createElement('div');
    numBadge.className = 'slot-number';
    numBadge.textContent = `0${i+1}`;
    div.appendChild(numBadge);

    if (poke) {
      const rmBtn = document.createElement('button');
      rmBtn.className = 'remove-btn';
      rmBtn.innerHTML = '✕';
      rmBtn.onclick = (e) => { e.stopPropagation(); slots[i] = null; buildGrid(); };
      div.appendChild(rmBtn);

      const content = document.createElement('div');
      content.className = 'slot-content';

      const rank = document.createElement('div');
      rank.className = 'slot-rank';
      rank.textContent = `NO.${String(poke.id).padStart(3,'0')}`;
      content.appendChild(rank);

      const img = document.createElement('img');
      img.className = 'slot-sprite';
      img.src = `${spriteBase}${poke.id}.png`;
      img.alt = poke.nameJp;
      content.appendChild(img);

      const nameJp = document.createElement('div');
      nameJp.className = 'slot-name-jp';
      nameJp.textContent = poke.nameJp;
      content.appendChild(nameJp);

      const nameEn = document.createElement('div');
      nameEn.className = 'slot-name-en';
      nameEn.textContent = poke.name.toUpperCase();
      content.appendChild(nameEn);

      if (poke.types) {
        const typesDiv = document.createElement('div');
        typesDiv.className = 'slot-types';
        poke.types.forEach(t => {
          const badge = document.createElement('span');
          badge.className = `type-badge type-${t}`;
          badge.textContent = typeJP(t);
          typesDiv.appendChild(badge);
        });
        content.appendChild(typesDiv);
      }

      const comment = document.createElement('textarea');
      comment.className = 'comment-area';
      comment.placeholder = 'ひとことメモ...';
      comment.value = poke.comment || '';
      comment.rows = 2;
      comment.onclick = (e) => e.stopPropagation();
      comment.oninput = () => { poke.comment = comment.value; };
      content.appendChild(comment);

      div.appendChild(content);
    } else {
      const empty = document.createElement('div');
      empty.className = 'slot-empty';
      const ball = createBallSVG(0.4);
      ball.className = 'slot-empty-ball';
      empty.appendChild(ball);
      const txt = document.createElement('div');
      txt.className = 'slot-empty-text';
      txt.textContent = 'タップして\n追加';
      empty.appendChild(txt);
      div.appendChild(empty);
    }

    div.onclick = () => {
      if (!poke) {
        selectedSlot = i;
        document.getElementById('searchInput').focus();
        showToast('検索してポケモンを選んでね！');
      }
    };

    grid.appendChild(div);
  });
}

function typeJP(t) {
  const map = {
    normal:'ノーマル',fire:'ほのお',water:'みず',electric:'でんき',grass:'くさ',
    ice:'こおり',fighting:'かくとう',poison:'どく',ground:'じめん',flying:'ひこう',
    psychic:'エスパー',bug:'むし',rock:'いわ',ghost:'ゴースト',dragon:'ドラゴン',
    dark:'あく',steel:'はがね',fairy:'フェアリー'
  };
  return map[t] || t;
}

// ─── Mini HyperBall SVG ────────────────────────────────────────────────────────
function createBallSVG(opacity = 0.5) {
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.innerHTML = `
    <path d="M5,50 A45,45 0 0,1 95,50 Z" fill="#cc1111" opacity="${opacity*3}"/>
    <path d="M5,50 A45,45 0 0,0 95,50 Z" fill="#dddddd" opacity="${opacity*3}"/>
    <rect x="5" y="45" width="90" height="10" fill="#222" opacity="${opacity*3}"/>
    <circle cx="50" cy="50" r="45" fill="none" stroke="#222" stroke-width="2.5" opacity="${opacity*3}"/>
    <circle cx="50" cy="50" r="12" fill="#222" opacity="${opacity*4}"/>
    <circle cx="50" cy="50" r="8" fill="#fff" opacity="${opacity*4}"/>
  `;
  return svg;
}

// ─── Search ───────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
const clearBtn = document.getElementById('clearBtn');

let searchTimer = null;

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  clearBtn.style.display = q ? 'flex' : 'none';
  if (!q) { searchResults.style.display = 'none'; return; }
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(q), 300);
});

async function doSearch(q) {
  if (!listReady) { showToast('データ読み込み中...'); return; }

  // ID検索
  const isNum = /^\d+$/.test(q);

  // まずキャッシュ済みの日本語名で絞り込み
  let candidates = pokemonList.filter(p => {
    if (isNum) return String(p.id).startsWith(q);
    if (p.nameJp) return p.nameJp.includes(q);
    // 英語名でも部分一致
    return p.nameEn.toLowerCase().includes(q.toLowerCase());
  }).slice(0, 12);

  if (!candidates.length) { searchResults.style.display = 'none'; return; }

  // 日本語名が未取得のものを並列取得（最大8件）
  await Promise.all(
    candidates.slice(0, 8).map(async p => {
      if (!p.nameJp) {
        p.nameJp = await getJpName(p.id, p.nameEn);
      }
    })
  );

  // 日本語名が取得できたら再フィルタ（日本語検索の場合）
  if (!isNum && /[\u3040-\u30ff\u4e00-\u9fff]/.test(q)) {
    candidates = candidates.filter(p => p.nameJp && p.nameJp.includes(q));
  }

  if (!candidates.length) { searchResults.style.display = 'none'; return; }

  searchResults.innerHTML = '';
  candidates.slice(0, 8).forEach(p => {
    const item = document.createElement('div');
    item.className = 'search-result-item';
    item.innerHTML = `
      <img class="result-sprite" src="${spriteBase}${p.id}.png" alt="${p.nameJp || p.nameEn}">
      <span class="result-name">${p.nameJp || p.nameEn}</span>
      <span class="result-id">No.${String(p.id).padStart(3,'0')}</span>
    `;
    item.onclick = () => selectPokemon(p.id, p.nameJp || p.nameEn);
    searchResults.appendChild(item);
  });
  searchResults.style.display = 'block';
}

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';
  searchResults.style.display = 'none';
});

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-section')) searchResults.style.display = 'none';
});

async function selectPokemon(id, nameJp) {
  searchResults.style.display = 'none';
  searchInput.value = '';
  clearBtn.style.display = 'none';

  // Find empty slot
  let targetSlot = selectedSlot >= 0 ? selectedSlot : slots.findIndex(s => !s);
  selectedSlot = -1;
  if (targetSlot < 0) { showToast('スロットが全て埋まっています！'); return; }

  // Fetch type data
  let types = [];
  let name = nameJp;
  try {
    if (!typeCache[id]) {
      const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
      const data = await res.json();
      typeCache[id] = { types: data.types.map(t => t.type.name), nameEn: data.name };
    }
    types = typeCache[id].types;
    name = typeCache[id].nameEn;
  } catch(e) {}

  slots[targetSlot] = { id, nameJp, name, types, comment: '' };
  buildGrid();
  showToast(`${nameJp} を追加しました！`);
}

// ─── Canvas Image Generation ──────────────────────────────────────────────────
document.getElementById('generateBtn').addEventListener('click', generateImage);

async function generateImage() {
  const btn = document.getElementById('generateBtn');
  btn.innerHTML = '<span class="loading-spinner"></span> 生成中...';
  btn.disabled = true;

  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;

  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  // Gradient BG
  const grad = ctx.createRadialGradient(200, 150, 0, 200, 150, 500);
  grad.addColorStop(0, 'rgba(26,26,255,0.12)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  const grad2 = ctx.createRadialGradient(900, 900, 0, 900, 900, 500);
  grad2.addColorStop(0, 'rgba(245,200,66,0.08)');
  grad2.addColorStop(1, 'transparent');
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.textAlign = 'center';
  ctx.font = 'bold 52px "Noto Sans JP", sans-serif';
  const titleGrad = ctx.createLinearGradient(340, 0, 740, 0);
  titleGrad.addColorStop(0, '#f5c842');
  titleGrad.addColorStop(0.5, '#ffffff');
  titleGrad.addColorStop(1, '#e8a000');
  ctx.fillStyle = titleGrad;
  ctx.fillText('推しポケモン 6選', W/2, 80);

  ctx.font = '18px "Noto Sans JP", sans-serif';
  ctx.fillStyle = 'rgba(240,240,255,0.4)';
  ctx.fillText('MY FAVORITE POKÉMON', W/2, 112);

  // Gold line
  ctx.strokeStyle = 'rgba(245,200,66,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(80, 130); ctx.lineTo(W-80, 130); ctx.stroke();

  // Draw 6 cards
  const cols = 3, rows = 2;
  const cw = 300, ch = 380;
  const gx = (W - cols * cw - (cols-1)*24) / 2;
  const gy = 155;

  const filled = slots.filter(s => s);

  for (let i = 0; i < 6; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const x = gx + col * (cw + 24);
    const y = gy + row * (ch + 24);
    await drawCard(ctx, x, y, cw, ch, slots[i], i);
  }

  // Footer
  ctx.font = '22px "Noto Sans JP", sans-serif';
  ctx.fillStyle = 'rgba(245,200,66,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText('# 推しポケモン6選', W/2, H - 36);

  btn.innerHTML = '<span class="btn-icon">🎨</span> 画像を生成';
  btn.disabled = false;

  document.getElementById('modalOverlay').classList.add('active');
}

async function drawCard(ctx, x, y, w, h, poke, idx) {
  // Card BG
  const r = 16;
  roundRect(ctx, x, y, w, h, r);
  const cardGrad = ctx.createLinearGradient(x, y, x+w, y+h);
  cardGrad.addColorStop(0, '#12121c');
  cardGrad.addColorStop(1, '#0d0d1a');
  ctx.fillStyle = cardGrad;
  ctx.fill();

  // Border
  ctx.strokeStyle = poke ? 'rgba(245,200,66,0.5)' : 'rgba(245,200,66,0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Slot number
  ctx.font = 'bold 13px "Zen Dots", monospace';
  ctx.fillStyle = 'rgba(245,200,66,0.7)';
  ctx.textAlign = 'left';
  ctx.fillText(`0${idx+1}`, x+14, y+24);

  if (!poke) {
    // Empty
    ctx.font = '15px "Noto Sans JP", sans-serif';
    ctx.fillStyle = 'rgba(240,240,255,0.2)';
    ctx.textAlign = 'center';
    ctx.fillText('空きスロット', x + w/2, y + h/2);
    return;
  }

  // Sprite
  await new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const sw = 110, sh = 110;
      ctx.drawImage(img, x + w/2 - sw/2, y + 40, sw, sh);
      resolve();
    };
    img.onerror = () => resolve();
    img.src = `${spriteBase}${poke.id}.png`;
  });

  // No.
  ctx.font = '12px monospace';
  ctx.fillStyle = 'rgba(245,200,66,0.6)';
  ctx.textAlign = 'center';
  ctx.fillText(`No.${String(poke.id).padStart(3,'0')}`, x + w/2, y + 168);

  // JP Name
  ctx.font = 'bold 26px "Noto Sans JP", sans-serif';
  ctx.fillStyle = '#f0f0ff';
  ctx.fillText(poke.nameJp, x + w/2, y + 200);

  // EN Name
  ctx.font = '13px monospace';
  ctx.fillStyle = 'rgba(240,240,255,0.4)';
  ctx.fillText(poke.name.toUpperCase(), x + w/2, y + 222);

  // Types
  if (poke.types && poke.types.length) {
    const typeColors = {
      normal:'#a8a878',fire:'#f08030',water:'#6890f0',electric:'#f8d030',
      grass:'#78c850',ice:'#98d8d8',fighting:'#c03028',poison:'#a040a0',
      ground:'#e0c068',flying:'#a890f0',psychic:'#f85888',bug:'#a8b820',
      rock:'#b8a038',ghost:'#705898',dragon:'#7038f8',dark:'#705848',
      steel:'#b8b8d0',fairy:'#f0b6bc'
    };
    const typeW = poke.types.length === 1 ? 90 : 85;
    const totalW = poke.types.length * typeW + (poke.types.length - 1) * 8;
    let tx = x + w/2 - totalW/2;
    poke.types.forEach(t => {
      ctx.fillStyle = typeColors[t] || '#888';
      roundRectFill(ctx, tx, y + 232, typeW, 22, 11);
      ctx.fillStyle = ['electric','ice','ground','steel','fairy','normal','bug'].includes(t) ? '#333' : '#fff';
      ctx.font = 'bold 11px "Noto Sans JP", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(typeJP(t), tx + typeW/2, y + 248);
      tx += typeW + 8;
    });
  }

  // Divider
  ctx.strokeStyle = 'rgba(245,200,66,0.12)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x + 14, y + 264);
  ctx.lineTo(x + w - 14, y + 264);
  ctx.stroke();

  // Comment
  if (poke.comment) {
    ctx.font = '13px "Noto Sans JP", sans-serif';
    ctx.fillStyle = 'rgba(240,240,255,0.5)';
    ctx.textAlign = 'center';
    const words = poke.comment;
    ctx.fillText(words.slice(0, 20), x + w/2, y + 285);
    if (words.length > 20) ctx.fillText(words.slice(20, 40), x + w/2, y + 305);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function roundRectFill(ctx, x, y, w, h, r) {
  roundRect(ctx, x, y, w, h, r);
  ctx.fill();
}
