<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#私を構成するポケモン6匹 (ハイパーボール版)</title>
    <style>
        :root {
            /* ハイパーボールカラー */
            --ultra-black: #333333;
            --ultra-yellow: #ffcb05;
            --ultra-white: #ffffff;
            --text-color: #ffffff;
        }

        body {
            font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #222; /* 画面全体の背景 */
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        /* アプリ本体のコンテナ（ハイパーボールデザイン） */
        .main-container {
            background: linear-gradient(
                180deg,
                var(--ultra-black) 0%,
                var(--ultra-black) 45%,
                var(--ultra-yellow) 45%,
                var(--ultra-yellow) 55%,
                var(--ultra-white) 55%,
                var(--ultra-white) 100%
            );
            border: 4px solid #000;
            border-radius: 20px;
            padding: 20px;
            width: 350px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--ultra-white);
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            text-shadow: 2px 2px 0 #000;
        }

        /* 2x3 グリッド */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
        }

        .slot {
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.8); /* 少し透過した白 */
            border: 3px solid #000;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.1s;
        }

        .slot:hover { transform: scale(1.02); }
        .slot.selected {
            border-color: var(--ultra-yellow);
            box-shadow: 0 0 15px var(--ultra-yellow);
        }

        .slot img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            z-index: 2;
        }

        .slot::before {
            content: "？";
            color: #ccc;
            font-size: 3rem;
            position: absolute;
            z-index: 1;
        }

        /* コントロールエリア */
        .controls {
            width: 100%;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box;
        }

        #status {
            font-size: 0.8rem;
            color: var(--ultra-yellow);
            min-height: 1.2em;
            margin-bottom: 5px;
        }

        input {
            padding: 12px;
            border: 2px solid #000;
            border-radius: 25px;
            width: 80%;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus {
            border-color: var(--ultra-yellow);
        }

        button {
            background: var(--ultra-black);
            color: var(--ultra-yellow);
            border: 2px solid var(--ultra-yellow);
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--ultra-yellow);
            color: var(--ultra-black);
        }

        canvas { display: none; } /* 保存用 */
    </style>
</head>
<body>

    <div class="main-container">
        <h1>#私を構成するポケモン6匹</h1>

        <div class="grid" id="pokemon-grid">
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
        </div>

        <div class="controls">
            <div id="status"></div>
            <input type="text" id="pokemon-input" placeholder="名前を入力（カタカナ）">
            <button onclick="generateImage()">画像として保存する</button>
        </div>
    </div>

    <canvas id="export-canvas"></canvas>

    <script>
        let selectedSlot = null;
        const input = document.getElementById('pokemon-input');
        const status = document.getElementById('status');

        function selectSlot(el) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            selectedSlot = el;
            el.classList.add('selected');
            input.focus();
        }

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && selectedSlot) {
                const name = input.value.trim();
                if (!name) return;
                status.innerText = "検索中...";

                try {
                    const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${encodeURIComponent(name)}/`);
                    if (!res.ok) throw new Error();
                    const species = await res.json();
                    const pokeRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${species.id}`);
                    const data = await pokeRes.json();
                    
                    const imgUrl = data.sprites.other['official-artwork'].front_default;
                    
                    const img = new Image();
                    img.crossOrigin = "Anonymous"; 
                    img.src = imgUrl;
                    img.onload = () => {
                        selectedSlot.innerHTML = "";
                        selectedSlot.appendChild(img);
                        selectedSlot.style.background = "white"; // 画像が入ったら背景を白に固定
                        input.value = "";
                        status.innerText = "";
                        selectedSlot.classList.remove('selected');
                        selectedSlot = null; // 選択を解除
                    };
                } catch (err) {
                    status.innerText = "見つかりませんでした（カタカナで入力）";
                }
            }
        });

        async function generateImage() {
            const canvas = document.getElementById('export-canvas');
            const ctx = canvas.getContext('2d');
            const slots = document.querySelectorAll('.slot');
            
            // キャンバスサイズ設定 (1000x1200)
            canvas.width = 1000;
            canvas.height = 1200;
            
            // --- ハイパーボール背景の描画 ---
            // 上部（黒）
            ctx.fillStyle = "#333333";
            ctx.fillRect(0, 0, canvas.width, canvas.height * 0.45);
            
            // 中央（黄）
            ctx.fillStyle = "#ffcb05";
            ctx.fillRect(0, canvas.height * 0.45, canvas.width, canvas.height * 0.1);
            
            // 下部（白）
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, canvas.height * 0.55, canvas.width, canvas.height * 0.45);

            // 外枠
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 10;
            ctx.strokeRect(5, 5, canvas.width-10, canvas.height-10);
            
            // --- タイトル描画 ---
            ctx.fillStyle = "#ffffff";
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 8;
            ctx.font = "bold 60px sans-serif";
            ctx.textAlign = "center";
            ctx.strokeText("#私を構成するポケモン6匹", 500, 100);
            ctx.fillText("#私を構成するポケモン6匹", 500, 100);

            // --- グリッドの描画 ---
            const padding = 30;
            const slotSize = 420; // マスのサイズ
            const startX = (canvas.width - (slotSize * 2 + padding)) / 2;
            const startY = 180;

            for (let i = 0; i < 6; i++) {
                const x = startX + (i % 2) * (slotSize + padding);
                const y = startY + Math.floor(i / 2) * (slotSize + padding);
                
                // マスの外枠と背景
                ctx.fillStyle = "rgba(255,255,255,0.9)";
                ctx.strokeStyle = "#000000";
                ctx.lineWidth = 6;
                
                // 角丸のマスを描画する関数
                drawRoundedRect(ctx, x, y, slotSize, slotSize, 20);
                ctx.fill();
                ctx.stroke();

                const img = slots[i].querySelector('img');
                if (img) {
                    // ポケモン画像を描画
                    // 画像を少し小さくして中央に配置
                    const imgPad = 20;
                    ctx.drawImage(img, x + imgPad, y + imgPad, slotSize - imgPad*2, slotSize - imgPad*2);
                }
            }

            // --- ダウンロード実行 ---
            const link = document.createElement('a');
            link.download = 'my-pokemon-team.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // 角丸矩形を描画するヘルパー関数
        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }
    </script>
</body>
</html>
