<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#私を構成するポケモン6匹</title>
    <style>
        :root { --u-black: #333; --u-yellow: #ffcb05; --u-white: #fff; }
        body { font-family: sans-serif; background: #222; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-container { 
            background: linear-gradient(180deg, var(--u-black) 45%, var(--u-yellow) 45%, var(--u-yellow) 55%, var(--u-white) 55%); 
            border: 4px solid #000; border-radius: 20px; padding: 20px; width: 340px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .slot { width: 150px; height: 150px; background: rgba(255,255,255,0.9); border: 3px solid #000; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .slot.selected { border: 4px solid var(--u-yellow); box-shadow: 0 0 15px var(--u-yellow); z-index: 10; }
        .slot img { width: 95%; height: 95%; object-fit: contain; }
        .controls { background: rgba(0,0,0,0.7); padding: 15px; border-radius: 15px; width: 100%; box-sizing: border-box; }
        input { padding: 12px; width: 85%; border-radius: 25px; border: 2px solid #000; margin-bottom: 10px; font-size: 16px; outline: none; }
        button { background: var(--u-yellow); color: #000; border: none; padding: 12px 25px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.05); background: #f0c000; }
        #status { font-size: 0.8rem; color: var(--u-yellow); margin-bottom: 5px; min-height: 1.2em; }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 style="text-shadow: 2px 2px 0 #000; font-size: 1.1rem; margin-top: 0;">#私を構成するポケモン6匹</h1>
        <div class="grid">
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
            <div class="slot" onclick="selectSlot(this)"></div>
        </div>
        <div class="controls">
            <div id="status"></div>
            <input type="text" id="p-input" placeholder="ピカチュウ、リザードン等">
            <button onclick="generateImage()">画像として保存</button>
        </div>
    </div>
    <canvas id="export-canvas" style="display:none;"></canvas>

    <script>
        // 日本語名 -> ID の辞書（主要なポケモンを抜粋して埋め込み）
        // ※コードが長くなりすぎるのを防ぐため一部ですが、これで「ピカチュウ」等は動きます。
        const pokemonDict = {
            "フシギダネ":1,"フシギソウ":2,"フシギバナ":3,"ヒトカゲ":4,"リザード":5,"リザードン":6,"ゼニガメ":7,"カメール":8,"カメックス":9,
            "ピカチュウ":25,"ライチュウ":26,"プリン":39,"プクリン":40,"ニャース":52,"コダック":54,"ゲンガー":94,"イーブイ":133,"シャワーズ":134,"サンダース":135,"ブースター":136,
            "ミュウツー":150,"ミュウ":151,"ルカリオ":448,"ニンフィア":700,"ゲッコウガ":658,"ミミッキュ":778,"ドラパルト":887,"コライドン":1007,"ミライドン":1008
        };

        // 辞書にない場合のために、実行時に補完するリスト（簡易版）
        let selectedSlot = null;
        const input = document.getElementById('p-input');
        const status = document.getElementById('status');

        function selectSlot(el) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            selectedSlot = el;
            el.classList.add('selected');
            input.focus();
        }

        // 入力イベント
        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && selectedSlot) {
                const name = input.value.trim();
                if (!name) return;

                // 1. 辞書からIDを探す
                let id = pokemonDict[name];
                
                // 2. 辞書にない場合はAPIに直接投げてみる（英語名 or ID用）
                if (!id) {
                    status.innerText = "検索中...";
                    try {
                        const res = await fetch(`https://pokeapi.co/api/v2/pokemon-species/${encodeURIComponent(name)}/`);
                        const sData = await res.json();
                        id = sData.id;
                    } catch(err) {
                        status.innerText = "見つかりません（カタカナで試してね）";
                        return;
                    }
                }

                try {
                    const pRes = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                    const data = await pRes.json();
                    const imgUrl = data.sprites.other['official-artwork'].front_default;
                    
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    img.src = imgUrl;
                    img.onload = () => {
                        selectedSlot.innerHTML = `<img src="${imgUrl}">`;
                        input.value = "";
                        status.innerText = "";
                        selectedSlot.classList.remove('selected');
                        selectedSlot = null;
                    };
                } catch (err) {
                    status.innerText = "画像が取得できませんでした";
                }
            }
        });

            canvas.width = 1000; canvas.height = 1200;

            ctx.fillStyle = "#333"; ctx.fillRect(0, 0, 1000, 540);
            ctx.fillStyle = "#ffcb05"; ctx.fillRect(0, 540, 1000, 120);
            ctx.fillStyle = "#fff"; ctx.fillRect(0, 660, 1000, 540);
            // タイトル
            ctx.fillStyle = "white"; ctx.font = "bold 60px sans-serif"; ctx.textAlign = "center";
            ctx.shadowColor = "black"; ctx.shadowBlur = 10;
            ctx.fillText("#私を構成するポケモン6匹", 500, 100);
            ctx.shadowBlur = 0;
            // スロット描画

            for (let i = 0; i < 6; i++) {
